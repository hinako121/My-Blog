<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:0.5"/>
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#g1)"/>
  <circle cx="300" cy="200" r="250" fill="#fff" opacity="0.05"/>
  <circle cx="1600" cy="800" r="400" fill="#fff" opacity="0.04"/>
  <circle cx="1000" cy="500" r="300" fill="#fff" opacity="0.03"/>
  <rect width="1920" height="1080" fill="url(#g1)" filter="url(#noise)"/>
</svg>
